<!DOCTYPE html>
<html>
<head>
    <title>Prediction</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">

<h1>Wind Energy Prediction</h1>

<form method="POST">

<input type="text"
       name="city"
       placeholder="Enter City"
       required>

<button type="submit">
Predict
</button>

</form>

{% if prediction %}
<div class="result">
    <h2>{{ prediction }}</h2>
</div>
{% endif %}

</div>

</body>
</html>
