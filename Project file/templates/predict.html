{% extends 'base.html' %}

{% block content %}

<div class="glass">

<h2>
Wind Energy Prediction
</h2>

<form id="predictionForm">

<input
type="text"
id="city"
placeholder="City"
required>

<input
type="number"
id="power"
placeholder="Theoretical Power"
required>

<input
type="number"
id="wind"
placeholder="Wind Speed"
required>

<button type="submit">
Predict
</button>

</form>

<div
id="loading"
class="hidden">

<div class="spinner"></div>

</div>

</div>

<div
id="resultCard"
class="glass hidden">

<h3>
Predicted Energy
</h3>

<h1 id="predictionValue">
0
</h1>

<p>kWh</p>

</div>

<div
id="weatherCard"
class="glass hidden">

<h3>Weather</h3>

<p id="temp"></p>
<p id="humidity"></p>
<p id="description"></p>
<p id="windspeed"></p>

</div>

{% endblock %}
