<!DOCTYPE html>
<html>
<head>
    <title>WindAI Prediction</title>
</head>
<body>

    <h1>WindAI Prediction</h1>

    <form id="predictForm">

        <input
            type="text"
            id="city"
            placeholder="City"
            required
        >
        <br><br>

        <input
            type="number"
            id="theoretical_power"
            placeholder="Theoretical Power"
            required
        >
        <br><br>

        <input
            type="number"
            step="0.1"
            id="wind_speed"
            placeholder="Wind Speed"
            required
        >
        <br><br>

        <button type="submit">
            Predict
        </button>

    </form>

    <h3 id="result"></h3>

    <script>
        document
            .getElementById(
                "predictForm"
            )
            .addEventListener(
                "submit",
                async function (e) {

                    e.preventDefault();

                    const response =
                        await fetch(
                            "/predict",
                            {
                                method:
                                    "POST",
                                headers: {
                                    "Content-Type":
                                        "application/json"
                                },
                                body:
                                    JSON.stringify({
                                        city:
                                            document.getElementById(
                                                "city"
                                            ).value,

                                        theoretical_power:
                                            document.getElementById(
                                                "theoretical_power"
                                            ).value,

                                        wind_speed:
                                            document.getElementById(
                                                "wind_speed"
                                            ).value
                                    })
                            }
                        );

                    const data =
                        await response.json();

                    document.getElementById(
                        "result"
                    ).innerHTML =
                        "Predicted Power: " +
                        data.prediction;
                }
            );
    </script>

</body>
</html>
