{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7 col-lg-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-4">

                <h2 class="text-center mb-4">
                    🌬️ WindAI Prediction
                </h2>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">
                            City
                        </label>

                        <input
                            type="text"
                            name="city"
                            class="form-control"
                            placeholder="Enter City"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Theoretical Power
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="theoretical_power"
                            class="form-control"
                            placeholder="Enter Theoretical Power"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Wind Speed
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="wind_speed"
                            class="form-control"
                            placeholder="Enter Wind Speed"
                            required
                        >
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >
                        Predict Power
                    </button>

                </form>

                {% if prediction %}

                <div
                    class="alert alert-success text-center mt-4"
                >
                    <h5>
                        Predicted Power
                    </h5>

                    <h2>
                        {{ prediction }}
                    </h2>
                </div>

                <div class="text-center">

                    <a
                        href="/dashboard"
                        class="btn btn-success"
                    >
                        View Dashboard
                    </a>

                    <a
                        href="/predict"
                        class="btn btn-secondary"
                    >
                        New Prediction
                    </a>

                </div>

                {% endif %}

            </div>

        </div>

    </div>

</div>

{% endblock %}
